name: Build and Deploy to K3s



on:

  push:

    branches:

      - main



jobs:

  build-and-deploy:

    runs-on: ubuntu-latest



    steps:

      - name: Checkout repo

        uses: actions/checkout@v4



      - name: Docker login

        uses: docker/login-action@v3

        with:

          username: ${{ secrets.DOCKERHUB_USERNAME }}

          password: ${{ secrets.DOCKERHUB_PASSWORD }}



      - name: Build image

        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/jay-devops-app:latest .



      - name: Push image

        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/jay-devops-app:latest



      - name: Deploy to EC2

        uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.EC2_HOST }}

          username: ubuntu

          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            sudo kubectl rollout restart deployment jay-devops-app

            sudo kubectl rollout status deployment jay-devops-app
